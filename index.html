<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connectivity Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc;
            --text-dim: #94a3b8; --primary: #38bdf8; --success: #22c55e;
            --error: #ef4444; --waiting: #64748b;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; align-items: flex-start; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-box { background: var(--card-bg); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 300px; }
        .auth-input { background: #0f172a; border: 2px solid var(--waiting); color: white; padding: 12px; border-radius: 8px; font-size: 1.5rem; text-align: center; margin-bottom: 20px; width: 100%; box-sizing: border-box; outline: none; }
        #main-content { display: none; width: 100%; max-width: 700px; margin-top: 20px; }
        .btn-check { width: 100%; padding: 14px; background-color: var(--primary); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 20px; }
        .site-grid { display: grid; gap: 16px; }
        .site-card { display: flex; align-items: center; background-color: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px 20px; transition: 0.3s; }
        .is-ok { border-left: 4px solid var(--success); cursor: pointer; }
        .is-ok:hover { background: #2d3a4f; transform: scale(1.02); }
        .is-error { border-left: 4px solid var(--error); opacity: 0.7; }
        .info-area { flex-grow: 1; overflow: hidden; }
        .site-name { font-weight: 600; display: block; }
        .site-url { font-size: 0.8rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-badge { padding: 6px 14px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; min-width: 80px; text-align: center; background: #334155; color: var(--text-dim); }
        .is-ok .status-badge { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .is-error .status-badge { background: rgba(239, 68, 68, 0.15); color: var(--error); }
        .loading { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 style="margin-top:0">PASSCODE</h2>
        <input type="password" id="passInput" class="auth-input" maxlength="4" placeholder="••••" autofocus>
        <button class="btn-check" onclick="checkPassword()">Unlock</button>
    </div>
</div>

<div id="main-content">
    <h1 style="text-align:center; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px;">Taichandrop Connectivity</h1>
    <button class="btn-check" id="mainBtn" onclick="checkAllSites()">Refresh All Systems</button>
    <div id="siteList" class="site-grid"></div>
</div>

<script>
    // 指定された新しいハッシュ値に更新
    const HASHED_PASS = "d4b23ca2344cd6e7f786113f8abbe11411e5609bb662d4827d30b52ab8cad0";

    async function a(t) {
        const m = new TextEncoder().encode(t);
        const h = await crypto.subtle.digest('SHA-256', m);
        return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function performAuth(v) {
        if (!v) return false;
        const hashed = await a(v);
        // 部分一致を避けるため厳密に比較
        if (hashed === HASHED_PASS) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            init(); checkAllSites(); return true;
        }
        return false;
    }

    async function checkPassword() {
        const val = document.getElementById('passInput').value;
        if (!await performAuth(val)) {
            alert("パスワードが違います。"); document.getElementById('passInput').value = "";
        }
    }

    window.addEventListener('load', async () => {
        const p = new URLSearchParams(window.location.search).get('p');
        if (p) await performAuth(p);
    });

    const targetSites = [
        { name: "local 1", url: "http://10.104.242.195:5001/" },
        { name: "local 2", url: "http://10.104.242.56:5001/" },
        { name: "GitHub", url: "https://fantastic-chainsaw-7v5gj75p7677fpq45-5001.app.github.dev/" }
    ];

    function init() {
        const list = document.getElementById('siteList');
        list.innerHTML = "";
        targetSites.forEach((site, i) => {
            const card = document.createElement('div');
            card.className = 'site-card';
            card.id = `card-${i}`;
            card.onclick = () => { if(card.classList.contains('is-ok')) window.location.href = site.url; };
            card.innerHTML = `<div class="info-area"><span class="site-name">${site.name}</span><span class="site-url">${site.url}</span></div><div id="status-${i}" class="status-badge">Ready</div>`;
            list.appendChild(card);
        });
    }

    async function checkAllSites() {
        const btn = document.getElementById('mainBtn');
        btn.disabled = true; btn.textContent = "Checking...";
        
        await Promise.all(targetSites.map(async (site, i) => {
            const badge = document.getElementById(`status-${i}`);
            const card = document.getElementById(`card-${i}`);
            badge.className = 'status-badge loading';
            
            let isOnline = false;

            if (site.url.startsWith('http://10.')) {
                // Local判定：Fetchではなく、より「生存確認」に近い方法
                isOnline = await new Promise(resolve => {
                    const img = new Image();
                    const timeout = setTimeout(() => { resolve(false); img.src = ""; }, 2500);
                    
                    // サーバーが動いていれば、たとえ画像がなくても「応答（エラー）」が返る
                    // サーバーが止まっていれば「タイムアウト」になる
                    img.onload = () => { clearTimeout(timeout); resolve(true); };
                    img.onerror = () => { 
                        clearTimeout(timeout); 
                        // 反応があった（404等でも接続はできた）場合は、相手が生きている証拠
                        resolve(true); 
                    };
                    img.src = site.url + "favicon.ico?t=" + Date.now();
                });
            } else {
                // GitHub判定：ページが存在するか厳密にチェック（CORS許可が必要）
                try {
                    const controller = new AbortController();
                    const tid = setTimeout(() => controller.abort(), 4000);
                    const res = await fetch(site.url, { mode: 'cors', signal: controller.signal });
                    clearTimeout(tid);
                    isOnline = res.ok;
                } catch(e) {
                    isOnline = false;
                }
            }

            badge.className = 'status-badge';
            badge.textContent = isOnline ? 'Online' : 'Offline';
            if (isOnline) { card.classList.add('is-ok'); card.classList.remove('is-error'); }
            else { card.classList.remove('is-ok'); card.classList.add('is-error'); }
        }));
        
        btn.disabled = false; btn.textContent = "Refresh All Systems";
    }
</script>
</body>
</html>
