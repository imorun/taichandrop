<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taichandrop Connectivity Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --primary: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --waiting: #64748b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            align-items: flex-start;
        }

        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .auth-box {
            background: var(--card-bg);
            padding: 40px; border-radius: 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 300px;
        }

        .auth-input {
            background: #0f172a; border: 2px solid var(--waiting); color: white;
            padding: 12px; border-radius: 8px; font-size: 1.5rem;
            text-align: center; margin-bottom: 20px; width: 100%; box-sizing: border-box; outline: none;
        }

        #main-content { display: none; width: 100%; max-width: 700px; margin-top: 20px; }

        .btn-check {
            width: 100%; padding: 14px; background-color: var(--primary);
            color: #000; border: none; border-radius: 12px;
            font-weight: 700; cursor: pointer;
        }

        .site-grid { display: grid; gap: 16px; margin-top: 20px; }
        .site-card {
            display: flex; align-items: center; background-color: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 16px;
            padding: 16px 20px; transition: 0.3s;
        }
        .is-ok { border-left: 4px solid var(--success); cursor: pointer; }
        .is-ok:hover { background: #2d3a4f; transform: scale(1.02); }
        .is-error { border-left: 4px solid var(--error); opacity: 0.7; }
        .is-upcoming { border-left: 4px solid var(--waiting); opacity: 0.5; }

        .info-area { flex-grow: 1; overflow: hidden; }
        .site-name { font-weight: 600; display: block; }
        .site-url { font-size: 0.8rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .status-badge {
            padding: 6px 14px; border-radius: 10px; font-size: 0.75rem;
            font-weight: 800; min-width: 80px; text-align: center;
            background: #334155; color: var(--text-dim);
        }
        .is-ok .status-badge { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .is-error .status-badge { background: rgba(239, 68, 68, 0.15); color: var(--error); }
        
        .loading { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 style="margin-top:0">PASSCODE</h2>
        <input type="password" id="passInput" class="auth-input" maxlength="4" placeholder="••••" autofocus>
        <button class="btn-check" onclick="checkPassword()">Unlock</button>
    </div>
</div>

<div id="main-content">
    <h1 style="text-align:center; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px;">Taichandrop Connectivity</h1>
    <button class="btn-check" id="mainBtn" onclick="checkAllSites()">Refresh All Systems</button>
    <div id="siteList" class="site-grid"></div>
</div>

<script>
    const HASHED_PASS = "d4b2392ca2344cd6e7f786113f8abbe11411e5609bb662d4827d30b52ab8cad0";

    async function a(text) {
        const msgUint8 = new TextEncoder().encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function performAuth(passValue) {
        if (!passValue) return false;
        const hashedInput = await a(passValue);
        if (hashedInput === HASHED_PASS) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            init();
            checkAllSites();
            return true;
        }
        return false;
    }

    async function checkPassword() {
        const input = document.getElementById('passInput').value;
        const success = await performAuth(input);
        if (!success) { alert("パスワードが違います。"); document.getElementById('passInput').value = ""; }
    }

    window.addEventListener('load', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const passParam = urlParams.get('p');
        if (passParam) await performAuth(passParam);
    });

    document.getElementById('passInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPassword(); });

    const targetSites = [
        { name: "local 1", url: "http://10.104.242.195:5001/" },
        { name: "local 2", url: "http://10.104.242.56:5001/" },
        { name: "GitHub", url: "https://fantastic-chainsaw-7v5gj75p7677fpq45-5001.app.github.dev/" },
        { name: "Scheduled to be added", url: "" }
    ];

    function init() {
        const list = document.getElementById('siteList');
        list.innerHTML = "";
        targetSites.forEach((site, index) => {
            const card = document.createElement('div');
            card.className = 'site-card';
            card.id = `card-${index}`;
            if (site.url) {
                card.onclick = () => { if(card.classList.contains('is-ok')) window.location.href = site.url; };
            } else {
                card.classList.add('is-upcoming');
            }
            card.innerHTML = `<div class="info-area"><span class="site-name">${site.name}</span><span class="site-url">${site.url || 'Future Integration'}</span></div><div id="status-${index}" class="status-badge">${site.url ? 'Ready' : 'Coming'}</div>`;
            list.appendChild(card);
        });
    }

    // 接続チェック関数：HTTPSからの制限を回避するための最終手段
    async function checkStatus(url, index) {
        const badge = document.getElementById(`status-${index}`);
        const card = document.getElementById(`card-${index}`);
        
        return new Promise((resolve) => {
            const isHttp = url.startsWith('http://');
            
            // fetchをまず試みる
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 4000);

            fetch(url, { mode: 'no-cors', signal: controller.signal })
                .then(() => {
                    clearTimeout(timeout);
                    updateUI(true);
                    resolve();
                })
                .catch(() => {
                    clearTimeout(timeout);
                    // HTTPS->HTTP制限で失敗した可能性がある場合、画像読み込みで最終チェック
                    if (isHttp) {
                        const img = new Image();
                        img.onload = () => { updateUI(true); resolve(); };
                        img.onerror = () => { updateUI(false); resolve(); };
                        img.src = url + "favicon.ico?t=" + Date.now();
                        setTimeout(() => { img.src = ""; updateUI(false); resolve(); }, 4500);
                    } else {
                        updateUI(false);
                        resolve();
                    }
                });

            function updateUI(isOk) {
                if (isOk) {
                    badge.className = 'status-badge'; badge.textContent = 'Online';
                    card.classList.add('is-ok'); card.classList.remove('is-error');
                } else {
                    badge.className = 'status-badge'; badge.textContent = 'Offline';
                    card.classList.add('is-error'); card.classList.remove('is-ok');
                }
            }
        });
    }

    async function checkAllSites() {
        const btn = document.getElementById('mainBtn');
        btn.disabled = true; btn.textContent = "Checking Status...";
        
        const tasks = targetSites.map((site, index) => {
            if(!site.url) return Promise.resolve();
            document.getElementById(`status-${index}`).className = 'status-badge loading';
            document.getElementById(`status-${index}`).textContent = '...';
            return checkStatus(site.url, index);
        });

        await Promise.all(tasks);
        btn.disabled = false; btn.textContent = "Refresh All Systems";
    }
</script>
</body>
</html>
